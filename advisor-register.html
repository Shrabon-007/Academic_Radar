<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advisor Registration | Academic Radar</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="auth-wrap">
    <section class="auth-card">
      <h1 class="auth-title">Advisor Registration</h1>
      <p class="auth-sub">Register advisor profile to monitor assigned students.</p>

      <form class="role-register-form" data-role="advisor">
        <div class="form-group">
          <label for="register-role-switch">Register As</label>
          <select id="register-role-switch">
            <option value="student">Student</option>
            <option value="advisor" selected>Advisor</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input id="name" type="text" placeholder="Dr. Advisor" required>
          </div>
          <div class="form-group">
            <label for="employeeId">Employee ID</label>
            <input id="employeeId" type="text" placeholder="ADV-102" required>
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="dept">Department</label>
            <input id="dept" type="text" placeholder="CSE" required>
          </div>
          <div class="form-group">
            <label for="batchFocus">Batch Focus</label>
            <input id="batchFocus" type="text" placeholder="60-61" required>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Official Email</label>
          <input id="email" type="email" placeholder="advisor@academicradar.edu" required>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Create password" required>
          </div>
          <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <input id="confirm" type="password" placeholder="Confirm password" required>
          </div>
        </div>

        <button class="btn btn-primary" type="submit">Register</button>
      </form>

      <p class="helper">Already have account? <a href="login.html?role=advisor" class="text-link">Advisor login</a></p>
      <p class="footer-note">Academic Radar Advisor Portal</p>
    </section>
  </main>
  

  <script src='auth.js'></script>
  <script src='app.js'></script>
</body>
</html>
